<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Um Mar de Amor para a Dri</title>
    <style>
        /* --- ESTILOS CSS (A "Mágica" Visual) --- */

        /* Define o fundo como um mar azul degradê e centraliza o conteúdo */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Um degradê suave para simular a profundidade do mar */
            background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Impede barras de rolagem para manter a cena clean */
            color: white;
            text-align: center;
        }

        /* Container principal para organizar os elementos */
        .container {
            position: relative;
            width: 80%;
            max-width: 600px;
            padding: 20px;
        }

        /* Título e orientações para a Dri */
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        p.instrucao {
            font-size: 1.2rem;
            margin-bottom: 30px;
            font-weight: 300;
        }

        /* --- POSICIONANDO O GIF DA TARTARUGA --- */
        .area-tartarugas {
            position: relative;
            /* Definimos uma altura mínima para dar espaço ao GIF e à mensagem */
            min-height: 250px; 
            margin-bottom: 20px;
            /* Centraliza o GIF horizontalmente */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Estilo para que o GIF fique clicável e reaja ao mouse */
        #tartaruga-click {
            cursor: pointer; /* Cursor de mãozinha */
            transition: transform 0.3s ease; /* Efeito suave */
            /* Se o GIF for muito grande, limitamos a largura (ex: 150px) */
            max-width: 200px; 
            height: auto;
        }

        #tartaruga-click:hover {
            transform: scale(1.1); /* Aumenta um pouquinho ao passar o mouse */
        }

        /* --- ESTILO DA MENSAGEM SURPRESA --- */

        /* A mensagem começa escondida */
        #mensagem-surpresa {
            display: none; /* Escondido por padrão */
            background-color: rgba(255, 255, 255, 0.9); /* Fundo branco semi-transparente */
            color: #333;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            font-size: 1.3rem;
            line-height: 1.6;
            animation: apareceSuave 0.5s ease; /* Animação para aparecer */
        }

        /* Destacando palavras chave na mensagem */
        #mensagem-surpresa strong {
            color: #d63384; /* Um tom de rosa/vermelho carinhoso */
        }

        /* Animação simples de fade-in */
        @keyframes apareceSuave {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Para meu Xodozinho</h1>
        <p class="instrucao">Minha princesa, o mar é lindo, assim como você. Clique na tartarugas para descobrir algo que você já sabe...</p>

       <div class="area-tartarugas">
            <img 
                id="tartaruga-click" 
                src="tartaruga.gif" 
                alt="GIF fofo de uma tartaruga marinha nadando"
                onclick="mostrarMensagem()"
            >
        </div>

        <div id="mensagem-surpresa">
            <p>Você é um doce <strong>Xodozinho</strong>, e eu <strong>AMO amar você</strong>. <br>Obrigada por ser minha namorada. Quero ser sua namorada até o resto da minha vida</p>
        </div>
    </div>

    <script>
        // Esta função é chamada quando qualquer tartaruga é clicada
        function mostrarMensagem() {
            // Seleciona o elemento da mensagem pelo ID
            const mensagem = document.getElementById('mensagem-surpresa');
            
            // Muda o estilo de exibição de 'none' (escondido) para 'block' (visível)
            mensagem.style.display = 'block';

            // Opcional: Rolar a página suavemente para a mensagem
            mensagem.scrollIntoView({ behavior: 'smooth' });
        }
    </script>

</body>
</html>
