<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Um Mar de Amor para a Dri</title>
    <style>
  /* --- CONFIGURAÇÕES DO CORPO (Ajustado para Centralizar) --- */
        body {
            margin: 0;
            padding: 0;
            /* Esses 3 comandos abaixo garantem a centralização total */
            display: center;
            justify-content: center; /* Centraliza horizontalmente */
            align-items: center;     /* Centraliza verticalmente */
            
            min-height: 100vh; /* Garante que o corpo tenha a altura de toda a tela */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            color: white;
            text-align: center; /* Garante que os textos dentro do container também centralizem */

            /* --- IMAGEM DE FUNDO --- */
            background-image: url('mar-fundo.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        /* --- CONTAINER COM EFEITO VIDRO FOSCO --- */
        .container {
            position: relative;
            width: 85%;
            max-width: 500px;
            padding: 30px;
            /* Fundo branco semi-transparente para dar leitura ao texto */
            background-color: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(8px); /* Deixa o fundo borradinho, bem moderno */
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .instrucao {
            font-size: 1.1rem;
            margin-bottom: 20px;
            font-weight: 300;
        }

        /* --- ÁREA DO GIF DA TARTARUGA --- */
        .area-tartarugas {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
            min-height: 180px;
        }

        #tartaruga-click {
            width: 160px; /* Ajuste o tamanho do GIF aqui */
            height: auto;
            cursor: pointer;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        #tartaruga-click:hover {
            transform: scale(1.1) rotate(5deg); /* Dá um leve tchauzinho ao passar o mouse */
        }

        /* --- MENSAGEM SURPRESA --- */
        #mensagem-surpresa {
            display: none;
            background-color: rgba(255, 255, 255, 0.95);
            color: #222;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            font-size: 1.2rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            animation: sobeSuave 0.6s ease forwards;
        }

        #mensagem-surpresa strong {
            color: #e91e63;
        }

        @keyframes sobeSuave {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Para a Dri, meu Xodozinho</h1>
        <p class="instrucao">Dri, clique
